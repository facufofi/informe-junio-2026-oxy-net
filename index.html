<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Informe Oxy Net · Acceso privado</title>
  <style>
    :root { --navy:#003b68; --sky:#008bd2; --mist:#eef7fb; --line:#d7e7ef; }
    * { box-sizing:border-box; }
    html, body { width:100%; min-height:100%; margin:0; }
    body {
      display:grid; min-height:100vh; place-items:center; overflow:hidden;
      background:
        radial-gradient(circle at 82% 14%, rgba(0,139,210,.22), transparent 28%),
        linear-gradient(135deg, #f9fcfe, #e5f4fa);
      color:#3c3c3b; font-family:Arial, sans-serif;
    }
    body::after {
      content:""; position:fixed; width:430px; height:430px; right:-210px; bottom:-190px;
      border-radius:50%; background:var(--navy);
    }
    .login {
      position:relative; z-index:2; width:min(460px, calc(100% - 32px)); padding:42px;
      border:1px solid rgba(255,255,255,.8); border-radius:26px;
      background:rgba(255,255,255,.92); box-shadow:0 24px 80px rgba(0,59,104,.15);
      backdrop-filter:blur(16px);
    }
    .mark {
      width:52px; height:52px; display:grid; margin-bottom:27px; place-items:center;
      border-radius:16px; background:var(--navy); color:#fff; font-size:15px; font-weight:700;
    }
    .eyebrow {
      margin:0 0 10px; color:var(--sky); font-size:11px; font-weight:700;
      letter-spacing:.16em; text-transform:uppercase;
    }
    h1 { margin:0; color:var(--navy); font-size:34px; line-height:1.08; }
    p { margin:14px 0 25px; color:#647784; font-size:14px; line-height:1.55; }
    label { display:block; margin-bottom:8px; color:var(--navy); font-size:12px; font-weight:700; }
    .field { display:flex; gap:9px; }
    input {
      min-width:0; flex:1; height:50px; padding:0 15px; border:1px solid var(--line);
      border-radius:13px; outline:none; background:#fff; font-size:15px;
    }
    input:focus { border-color:var(--sky); box-shadow:0 0 0 3px rgba(0,139,210,.12); }
    button {
      height:50px; padding:0 19px; border:0; border-radius:13px; background:var(--sky);
      color:#fff; cursor:pointer; font-weight:700;
    }
    button:disabled { cursor:wait; opacity:.65; }
    .message { min-height:20px; margin:13px 0 0; color:#b42318; font-size:12px; }
    .privacy { margin:20px 0 0; color:#8a9aa2; font-size:10px; }
    iframe { position:fixed; inset:0; z-index:10; width:100%; height:100%; border:0; background:#fff; }
    [hidden] { display:none !important; }
  </style>
</head>
<body>
  <main class="login" id="login">
    <div class="mark">ON</div>
    <p class="eyebrow">Acceso privado</p>
    <h1>Informe junio 2026</h1>
    <p>Ingresá la contraseña compartida para abrir el informe interactivo de Oxy Net.</p>
    <form id="form">
      <label for="password">Contraseña</label>
      <div class="field">
        <input id="password" type="password" autocomplete="current-password" required autofocus>
        <button id="submit" type="submit">Ingresar</button>
      </div>
      <p class="message" id="message" role="alert"></p>
    </form>
    <p class="privacy">El contenido se descifra localmente en este navegador.</p>
  </main>
  <iframe id="report" title="Informe Oxy Net" sandbox="allow-scripts allow-same-origin allow-popups allow-downloads allow-forms" hidden></iframe>
  <script>
    const form = document.getElementById("form");
    const input = document.getElementById("password");
    const submit = document.getElementById("submit");
    const message = document.getElementById("message");

    function bytesToText(bytes) {
      return new TextDecoder().decode(bytes);
    }

    function b64ToBytes(base64) {
      const binary = atob(base64.replace(/\s/g, ""));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submit.disabled = true;
      message.textContent = "Verificando acceso...";
      try {
        const response = await fetch("payload.b64", { cache: "no-store" });
        if (!response.ok) throw new Error("No se pudo cargar el informe.");
        const packed = b64ToBytes(await response.text());
        if (bytesToText(packed.slice(0, 4)) !== "OXY1") throw new Error("Formato inválido.");
        const salt = packed.slice(4, 20);
        const iv = packed.slice(20, 32);
        const ciphertext = packed.slice(32);
        const material = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(input.value),
          "PBKDF2",
          false,
          ["deriveKey"]
        );
        const key = await crypto.subtle.deriveKey(
          { name: "PBKDF2", salt, iterations: 310000, hash: "SHA-256" },
          material,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );
        const plaintext = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          key,
          ciphertext
        );
        const report = document.getElementById("report");
        report.srcdoc = bytesToText(new Uint8Array(plaintext));
        report.hidden = false;
        document.getElementById("login").hidden = true;
        message.textContent = "";
      } catch (error) {
        message.textContent = "Contraseña incorrecta. Revisala e intentá nuevamente.";
        input.select();
      } finally {
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
